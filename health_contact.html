<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>health_contact.html</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        @keyframes bruh {
            0% {
                color: red;
            }
            25% {
                color: black;
            }
            50% {
                color: blue;
            }
            75% {
                color: black;
            }
            100% {
                color: red;
            }
        }
        h1 {
            color: red;
            animation-name: bruh;
            animation-duration: 4s;
            animation-iteration-count: infinite;
            font-size: 25vw;
            font-style: italic;
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
    </style>
</head>
<body>
    <h1> bruh</h1>
</body>
</html>
